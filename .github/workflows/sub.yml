name: Auto Free Nodes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Fetch and merge subscriptions
        run: |
          mkdir -p sub
          curl -L https://raw.githubusercontent.com/aiboboxx/v2rayfree/main/v2 -o sub/a.txt
          curl -L https://raw.githubusercontent.com/mahdibland/ShadowsocksAggregator/master/sub/sub_merge.txt -o sub/b.txt

          cat sub/a.txt sub/b.txt > sub/all.txt

      - name: Base64 encode (for Shadowrocket)
        run: |
          base64 sub/all.txt > sub/sub.txt

      - name: Commit
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add sub/sub.txt
          git commit -m "update sub" || echo "no change"
          git push

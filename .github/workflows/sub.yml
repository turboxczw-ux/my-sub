name: Convert Sub to Clash

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install subconverter
        run: |
          git clone https://github.com/tindy2013/subconverter.git
          cd subconverter
          chmod +x subconverter_linux64

      - name: Convert
        run: |
          cd subconverter
          echo "url=$(cat ../sub.txt)" > pref.ini
          echo "target=clash" >> pref.ini
          echo "list=true" >> pref.ini
          ./subconverter_linux64

      - name: Move result
        run: |
          cp subconverter/output/* ./clash.yaml || true

      - name: Commit result
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "update clash config" || echo "no changes"
          git push
